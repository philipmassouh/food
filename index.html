<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Philip's Spots</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    </head>
    <body>
        <div id="map"></div>
        <form id="map-controls" aria-label="Map controls">
            <input type="checkbox" id="toggle-tooltips" class="control-input" />
            <label for="toggle-tooltips" class="map-control-chip">Names</label>

            <fieldset class="map-filter">
                <legend class="sr-only">Map filter</legend>

                <input type="radio" name="map-filter" id="filter-been" class="control-input" value="been" checked />
                <label for="filter-been" class="map-filter-btn">Been</label>

                <input type="radio" name="map-filter" id="filter-try" class="control-input" value="try" />
                <label for="filter-try" class="map-filter-btn">Try</label>

                <input type="radio" name="map-filter" id="filter-both" class="control-input" value="both" />
                <label for="filter-both" class="map-filter-btn">Both</label>
            </fieldset>
        </form>
        <div id="modal"></div>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <script src="utils.js"></script>
        <script src="main.js"></script>
    </body>
</html>
